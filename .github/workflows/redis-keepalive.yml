name: Redis Keep-Alive
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-redis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install ioredis
      - run: node redis-ping.js
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}